<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>
      AVAM | Inicio
    </title>
    <link rel="stylesheet" href="../css/base.css?v=20260719-2">
    <link rel="stylesheet" href="../css/adulto-mayor.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar start">
        <span>
          Hola, Juan 👋
        </span>
        <button class="icon-btn" data-toast="No tienes notificaciones nuevas" aria-label="Notificaciones">
          🔔
        </button>
      </header>
      <section class="content">
        <div class="bot-avatar">
          🤖
        </div>
        <div class="messages">
          <div class="bubble incoming">
            Soy AVAM, tu asistente virtual. ¿En qué puedo ayudarte hoy?
          </div>
        </div>
        <button class="quick-chip">
          Necesito comprar medicamentos
        </button>
        <button class="quick-chip">
          Quiero hacer el supermercado
        </button>
        <button class="quick-chip">
          Necesito pagar un recibo
        </button>
        <button class="quick-chip">
          Necesito acompañamiento
        </button>
        <div class="composer">
          <input aria-label="Solicitud" placeholder="Escribe tu solicitud...">
          <button class="send" data-send aria-label="Enviar">
            ➤
          </button>
        </div>
      </section>
      <nav class="navbar">
        <a class="navitem active" href="inicio.html">
          <span class="dot">
            🏠
          </span>
          Inicio
        </a>
        <a class="navitem" href="seguimiento.html">
          <span class="dot">
            📋
          </span>
          Mis solicitudes
        </a>
        <a class="navitem" href="mensajes.html">
          <span class="dot">
            💬
          </span>
          Mensajes
        </a>
        <a class="navitem" href="perfil.html">
          <span class="dot">
            👤
          </span>
          Perfil
        </a>
      </nav>
    </main>
    <script src="../js/app.js?v=20260719-2">
    </script>
  </body>
</html>
