<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>
      AVAM | Chat
    </title>
    <link rel="stylesheet" href="../css/base.css?v=20260719-4">
    <link rel="stylesheet" href="../css/adulto-mayor.css">
  </head>
  <body>
    <main class="app chat-shell">
      <header class="topbar">
        <a class="icon-btn" href="inicio.html" aria-label="Volver">
          ‹
        </a>
        <span class="topbar-title">
          Chat con AVAM
        </span>
        <button class="icon-btn" data-toast="Opciones de conversación" aria-label="Opciones">
          ⋮
        </button>
      </header>
      <section class="content" data-guided-request>
        <div class="messages" data-guided-messages></div>
        <div class="flow-options" data-guided-options></div>
      </section>
      <div class="readonly-composer guided-composer" aria-label="Barra de chat de demostración">
        <input type="text" placeholder="Escribe tu respuesta..." disabled>
        <button class="send" aria-label="Enviar deshabilitado" disabled>
          ➤
        </button>
      </div>
      <nav class="navbar">
        <a class="navitem active" href="inicio.html">
          <span class="dot">🏠</span>Inicio
        </a>
        <a class="navitem" href="seguimiento.html">
          <span class="dot">📋</span>Mis solicitudes
        </a>
        <a class="navitem" href="mensajes.html">
          <span class="dot">💬</span>Mensajes
        </a>
        <a class="navitem" href="perfil.html">
          <span class="dot">👤</span>Perfil
        </a>
      </nav>
    </main>
    <script src="../js/app.js?v=20260719-4">
    </script>
  </body>
</html>
