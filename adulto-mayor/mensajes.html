<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>
      AVAM | Mensajes
    </title>
    <link rel="stylesheet" href="../css/base.css?v=20260719-4">
    <link rel="stylesheet" href="../css/adulto-mayor.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar start">
        <span>
          Mensajes
        </span>
        <button class="icon-btn" data-toast="Nuevo mensaje" aria-label="Nuevo mensaje">
          ✎
        </button>
      </header>
      <section class="content">
        <input class="search" data-search aria-label="Buscar conversación" placeholder="🔍 Buscar conversación">
        <div class="section-title">
          Fijado
        </div>
        <button class="chat-item" data-search-item data-go="conversacion.html?chat=avam">
          <span class="avatar">
            🤖
          </span>
          <span class="chat-meta">
            <span class="chat-name">
              AVAM Asistente
            </span>
            <span class="chat-preview">
              ¿A qué hora necesitas que te los entreguen?
            </span>
          </span>
          <span class="chat-time">
            10:32 a.m.
            <br>
            <span class="badge">
              2
            </span>
          </span>
        </button>
        <div class="section-title">
          Colaboradores
        </div>
        <button class="chat-item" data-search-item data-go="conversacion.html?chat=juan">
          <span class="avatar">
            JR
          </span>
          <span class="chat-meta">
            <span class="chat-name">
              Juan Rodríguez
            </span>
            <span class="chat-preview">
              Voy en camino con tus medicamentos 🚗
            </span>
          </span>
          <span class="chat-time">
            11:05 a.m.
          </span>
        </button>
        <button class="chat-item" data-search-item data-go="conversacion.html?chat=carla">
          <span class="avatar">
            CM
          </span>
          <span class="chat-meta">
            <span class="chat-name">
              Carla Méndez
            </span>
            <span class="chat-preview">
              Servicio completado, ¡gracias!
            </span>
          </span>
          <span class="chat-time">
            Ayer
          </span>
        </button>
        <div class="section-title">
          Soporte
        </div>
        <button class="chat-item" data-search-item data-go="conversacion.html?chat=soporte">
          <span class="avatar">
            SA
          </span>
          <span class="chat-meta">
            <span class="chat-name">
              Soporte AVAM
            </span>
            <span class="chat-preview">
              ¿Necesitas ayuda con tu solicitud?
            </span>
          </span>
          <span class="chat-time">
            18/05
          </span>
        </button>
      </section>
      <nav class="navbar">
        <a class="navitem" href="inicio.html">
          <span class="dot">
            🏠
          </span>
          Inicio
        </a>
        <a class="navitem" href="seguimiento.html">
          <span class="dot">
            📋
          </span>
          Mis solicitudes
        </a>
        <a class="navitem active" href="mensajes.html">
          <span class="dot">
            💬
          </span>
          Mensajes
        </a>
        <a class="navitem" href="perfil.html">
          <span class="dot">
            👤
          </span>
          Perfil
        </a>
      </nav>
    </main>
    <script src="../js/app.js?v=20260719-4">
    </script>
  </body>
</html>
