<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>
      AVAM | Solicitud creada
    </title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/adulto-mayor.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <a class="icon-btn" href="chat.html" aria-label="Volver">
          ‹
        </a>
        <span class="topbar-title">
          Solicitud creada
        </span>
        <button class="icon-btn" data-toast="Opciones de solicitud" aria-label="Opciones">
          ⋮
        </button>
      </header>
      <section class="content">
        <div class="success-ring">
          ✓
        </div>
        <p class="center muted">
          He preparado tu solicitud con la información que me diste. Revísala antes de publicarla.
        </p>
        <div class="info-card">
          <div class="info-row">
            <span class="icon-badge">
              📦
            </span>
            <div>
              <b>
                Categoría
              </b>
              Compra de medicamentos
            </div>
          </div>
          <div class="info-row">
            <span class="icon-badge">
              📍
            </span>
            <div>
              <b>
                Farmacia
              </b>
              Farmacia Metro - Bella Vista
            </div>
          </div>
          <div class="info-row">
            <span class="icon-badge">
              🕐
            </span>
            <div>
              <b>
                Entrega
              </b>
              Antes de las 5:00 p.m.
            </div>
          </div>
          <div class="info-row">
            <span class="icon-badge">
              💲
            </span>
            <div>
              <b>
                Pago ofrecido
              </b>
              $8.00
            </div>
          </div>
        </div>
        <button class="btn" data-go="seguimiento.html">
          Publicar solicitud
        </button>
        <button class="btn outline" data-go="chat.html">
          Editar información
        </button>
      </section>
      <nav class="navbar">
        <a class="navitem" href="inicio.html">
          <span class="dot">
            🏠
          </span>
          Inicio
        </a>
        <a class="navitem active" href="seguimiento.html">
          <span class="dot">
            📋
          </span>
          Mis solicitudes
        </a>
        <a class="navitem" href="mensajes.html">
          <span class="dot">
            💬
          </span>
          Mensajes
        </a>
        <a class="navitem" href="perfil.html">
          <span class="dot">
            👤
          </span>
          Perfil
        </a>
      </nav>
    </main>
    <script src="../js/app.js">
    </script>
  </body>
</html>
