<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>
      AVAM | Servicio en progreso
    </title>
    <link rel="stylesheet" href="../css/base.css?v=20260719-1">
    <link rel="stylesheet" href="../css/colaborador.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <a class="icon-btn" href="servicios.html" aria-label="Volver">
          ‹
        </a>
        <span class="topbar-title">
          Servicio en progreso
        </span>
        <button class="icon-btn" data-toast="Opciones del servicio" aria-label="Opciones">
          ⋮
        </button>
      </header>
      <section class="content">
        <div class="step-list">
          <div class="step-item">
            <span class="step-dot">
              ✓
            </span>
            <div class="step-text">
              <b>
                Aceptaste el servicio
              </b>
              <span>
                10:30 a.m.
              </span>
            </div>
          </div>
          <div class="step-item">
            <span class="step-dot">
              ✓
            </span>
            <div class="step-text">
              <b>
                En camino al destino
              </b>
              <span>
                10:45 a.m.
              </span>
            </div>
          </div>
          <div class="step-item">
            <span class="step-dot">
              ●
            </span>
            <div class="step-text">
              <b>
                Comprando productos
              </b>
              <span>
                11:05 a.m.
              </span>
            </div>
          </div>
          <div class="step-item">
            <span class="step-dot pending">
              ○
            </span>
            <div class="step-text">
              <b>
                En camino a entregar
              </b>
            </div>
          </div>
          <div class="step-item">
            <span class="step-dot pending">
              ○
            </span>
            <div class="step-text">
              <b>
                Entregado
              </b>
            </div>
          </div>
        </div>
        <div class="person-card">
          <span class="avatar">
            JP
          </span>
          <div>
            <b>
              Juan Pérez
            </b>
            <div class="muted">
              📞 Cliente del servicio
            </div>
          </div>
        </div>
        <button class="btn outline" data-toast="Llamando a Juan Pérez...">
          Llamar al cliente
        </button>
        <button class="btn" data-go="completado.html">
          Marcar como entregado
        </button>
      </section>
      <nav class="navbar">
        <a class="navitem" href="inicio.html">
          <span class="dot">
            🏠
          </span>
          Inicio
        </a>
        <a class="navitem active" href="servicios.html">
          <span class="dot">
            🧰
          </span>
          Mis servicios
        </a>
        <a class="navitem" href="mensajes.html">
          <span class="dot">
            💬
          </span>
          Mensajes
        </a>
        <a class="navitem" href="perfil.html">
          <span class="dot">
            👤
          </span>
          Perfil
        </a>
      </nav>
    </main>
    <script src="../js/app.js?v=20260719-1">
    </script>
  </body>
</html>
