<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>
      AVAM | Inicio colaborador
    </title>
    <link rel="stylesheet" href="../css/base.css?v=20260719-1">
    <link rel="stylesheet" href="../css/colaborador.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar start">
        <span>
          Hola, María 👋
        </span>
        <button class="icon-btn" data-toast="Tienes 2 solicitudes nuevas" aria-label="Notificaciones">
          🔔
        </button>
      </header>
      <section class="content">
        <div class="toggle-row">
          Disponible para trabajar
          <button class="toggle on" aria-label="Disponibilidad" aria-pressed="true">
          </button>
        </div>
        <div class="mini-stats">
          <div class="mini-stat">
            <b>
              12
            </b>
            <span>
              Servicios
            </span>
          </div>
          <div class="mini-stat">
            <b>
              4.9
            </b>
            <span>
              Calificación
            </span>
          </div>
          <div class="mini-stat">
            <b>
              $96
            </b>
            <span>
              Ganancias
            </span>
          </div>
        </div>
        <div class="section-title">
          Solicitudes disponibles
        </div>
        <button class="job-card" data-go="detalle.html">
          <div class="job-title">
            🧴 Comprar medicamentos
          </div>
          <div class="job-sub">
            Farmacia Metro - Bella Vista · 1.2 km
          </div>
          <div class="job-price">
            $8.00
          </div>
        </button>
        <button class="job-card" data-toast="Solicitud de supermercado seleccionada">
          <div class="job-title">
            🛒 Hacer supermercado
          </div>
          <div class="job-sub">
            Super Xtra · 2.3 km
          </div>
          <div class="job-price">
            $12.00
          </div>
        </button>
      </section>
      <nav class="navbar">
        <a class="navitem active" href="inicio.html">
          <span class="dot">
            🏠
          </span>
          Inicio
        </a>
        <a class="navitem" href="servicios.html">
          <span class="dot">
            🧰
          </span>
          Mis servicios
        </a>
        <a class="navitem" href="mensajes.html">
          <span class="dot">
            💬
          </span>
          Mensajes
        </a>
        <a class="navitem" href="perfil.html">
          <span class="dot">
            👤
          </span>
          Perfil
        </a>
      </nav>
    </main>
    <script src="../js/app.js?v=20260719-1">
    </script>
  </body>
</html>
