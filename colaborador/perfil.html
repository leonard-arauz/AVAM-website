<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>
      AVAM | Mi perfil
    </title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/colaborador.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <a class="icon-btn" href="inicio.html" aria-label="Volver">
          ‹
        </a>
        <span class="topbar-title">
          Mi perfil
        </span>
        <button class="icon-btn" data-toast="Configuración" aria-label="Configuración">
          ⚙
        </button>
      </header>
      <section class="content">
        <div class="profile-hero">
          <div class="profile-avatar">
            M
          </div>
          <div class="profile-name">
            María Rodríguez
          </div>
          <div class="profile-sub">
            Colaboradora · ⭐ 4.9 (28 evaluaciones)
          </div>
        </div>
        <div class="stats">
          <div class="stat">
            <b>
              12
            </b>
            <span>
              Servicios
            </span>
          </div>
          <div class="stat">
            <b>
              4.9
            </b>
            <span>
              Calificación
            </span>
          </div>
          <div class="stat">
            <b>
              $96
            </b>
            <span>
              Ganancias
            </span>
          </div>
        </div>
        <button class="menu-item" data-toast="Información personal">
          <span class="mi-icon">
            👤
          </span>
          Información personal
          <span class="chev">
            ›
          </span>
        </button>
        <button class="menu-item" data-toast="Documentos verificados">
          <span class="mi-icon">
            📄
          </span>
          Mis documentos
          <span class="chev">
            Verificado
          </span>
        </button>
        <button class="menu-item" data-toast="Métodos de pago">
          <span class="mi-icon">
            💳
          </span>
          Métodos de pago
          <span class="chev">
            ›
          </span>
        </button>
        <button class="menu-item" data-toast="Ganancias acumuladas: $96.00">
          <span class="mi-icon">
            💲
          </span>
          Mis ganancias
          <span class="chev">
            $96.00
          </span>
        </button>
        <button class="menu-item" data-toast="Ayuda y soporte">
          <span class="mi-icon">
            ❓
          </span>
          Ayuda y soporte
          <span class="chev">
            ›
          </span>
        </button>
        <button class="menu-item" data-go="../index.html">
          <span class="mi-icon">
            ↪
          </span>
          Cerrar sesión
          <span class="chev">
            ›
          </span>
        </button>
      </section>
      <nav class="navbar">
        <a class="navitem" href="inicio.html">
          <span class="dot">
            🏠
          </span>
          Inicio
        </a>
        <a class="navitem" href="servicios.html">
          <span class="dot">
            🧰
          </span>
          Mis servicios
        </a>
        <a class="navitem" href="mensajes.html">
          <span class="dot">
            💬
          </span>
          Mensajes
        </a>
        <a class="navitem active" href="perfil.html">
          <span class="dot">
            👤
          </span>
          Perfil
        </a>
      </nav>
    </main>
    <script src="../js/app.js">
    </script>
  </body>
</html>
