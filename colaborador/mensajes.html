<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>
      AVAM | Mensajes
    </title>
    <link rel="stylesheet" href="../css/base.css?v=20260718-3">
    <link rel="stylesheet" href="../css/colaborador.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar start">
        <span>
          Mensajes
        </span>
        <button class="icon-btn" data-toast="Tienes un mensaje nuevo" aria-label="Notificaciones">
          🔔
        </button>
      </header>
      <section class="content">
        <input class="search" data-search aria-label="Buscar conversación" placeholder="🔍 Buscar conversación">
        <div class="section-title">
          Clientes activos
        </div>
        <button class="chat-item" data-search-item data-chat="Juan Pérez">
          <span class="avatar">
            JP
          </span>
          <span class="chat-meta">
            <span class="chat-name">
              Juan Pérez
            </span>
            <span class="chat-preview">
              Perfecto, te espero. Muchas gracias 🙏
            </span>
          </span>
          <span class="chat-time">
            11:07 a.m.
            <br>
            <span class="badge">
              1
            </span>
          </span>
        </button>
        <div class="section-title">
          Recientes
        </div>
        <button class="chat-item" data-search-item data-chat="Marta Gómez">
          <span class="avatar">
            MG
          </span>
          <span class="chat-meta">
            <span class="chat-name">
              Marta Gómez
            </span>
            <span class="chat-preview">
              Gracias por el súper, quedó excelente
            </span>
          </span>
          <span class="chat-time">
            Ayer
          </span>
        </button>
        <button class="chat-item" data-search-item data-chat="Roberto López">
          <span class="avatar">
            RL
          </span>
          <span class="chat-meta">
            <span class="chat-name">
              Roberto López
            </span>
            <span class="chat-preview">
              ¿Podrías confirmar la hora de entrega?
            </span>
          </span>
          <span class="chat-time">
            17/05
          </span>
        </button>
        <div class="section-title">
          Soporte
        </div>
        <button class="chat-item" data-search-item data-chat="Soporte AVAM">
          <span class="avatar">
            SA
          </span>
          <span class="chat-meta">
            <span class="chat-name">
              Soporte AVAM
            </span>
            <span class="chat-preview">
              Tu pago semanal fue procesado.
            </span>
          </span>
          <span class="chat-time">
            15/05
          </span>
        </button>
      </section>
      <nav class="navbar">
        <a class="navitem" href="inicio.html">
          <span class="dot">
            🏠
          </span>
          Inicio
        </a>
        <a class="navitem" href="servicios.html">
          <span class="dot">
            🧰
          </span>
          Mis servicios
        </a>
        <a class="navitem active" href="mensajes.html">
          <span class="dot">
            💬
          </span>
          Mensajes
        </a>
        <a class="navitem" href="perfil.html">
          <span class="dot">
            👤
          </span>
          Perfil
        </a>
      </nav>
    </main>
    <script src="../js/app.js?v=20260718-3">
    </script>
  </body>
</html>
